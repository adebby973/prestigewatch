<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signin</title>
    <link rel="stylesheet" href="/dist/output.css">
</head>
<body class="font-serif w-full h-full flex justify-center items-center ">
  <form action="" class="flex justify-center p-5 border-2 flex-col items-center bg-neutral-900 rounded-xl">
    <h3 class="text-4xl text-white mb-4">Prestige Signin</h3>
    <input type="text" name="user" placeholder="Username" class="border m-2 p-2 rounded w-64 bg-white">
    <input type="password" name="password" placeholder="Password" class="border m-2 p-2 rounded w-64  bg-white">
    <button class="border-2 w-40 p-2 bg-amber-400 text-white rounded-2xl mt-4">Sign In</button>
    <p class="text-white mt-2">
      If you do not have an account
      <a href="./signup.html" class="text-amber-400">Sign Up</a>
    </p>
  </form>
</body>
</html>
